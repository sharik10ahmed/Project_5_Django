{% extends 'base.html' %}


{% block title %}

Register

{% endblock %}





{% block content %}


<div class="container mt-5">


<div class="row justify-content-center">


<div class="col-md-5">


<div class="card shadow">



<div class="card-header bg-primary text-white">


<h4 class="text-center">

Create Account

</h4>


</div>




<div class="card-body">


<form method="POST">


{% csrf_token %}





<!-- Full Name -->

<div class="mb-3">


<label class="form-label">

Full Name

</label>


<input

type="text"

name="full_name"

class="form-control"

placeholder="Enter full name"

required>


</div>






<!-- Email -->


<div class="mb-3">


<label class="form-label">

Email

</label>


<input

type="email"

name="email"

class="form-control"

placeholder="Enter email"

required>


</div>






<!-- Mobile Number -->


<div class="mb-3">


<label class="form-label">

Mobile Number

</label>


<input

type="text"

name="mobile_no"

class="form-control"

placeholder="Enter mobile number"

required>


</div>






<!-- Password -->


<div class="mb-3">


<label class="form-label">

Password

</label>


<input

type="password"

name="password"

class="form-control"

placeholder="Enter password"

required>


</div>







<!-- Confirm Password -->


<div class="mb-3">


<label class="form-label">

Confirm Password

</label>


<input

type="password"

name="password2"

class="form-control"

placeholder="Confirm password"

required>


</div>






<button class="btn btn-primary w-100">


Register


</button>




</form>



</div>


</div>


</div>


</div>


</div>



{% endblock %}
